<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlotBot — Western Valley</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #94a3b8;
    --user-bubble: #1d4ed8;
    --bot-bubble: #1e2330;
    --success: #10b981;
    --warning: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Hind Siliguri',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo { width:40px; height:40px; background:linear-gradient(135deg,#1d4ed8,#06b6d4); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .header-title { font-size:16px; font-weight:700; }
  .header-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .status-pill { display:flex; align-items:center; gap:6px; background:#0d2b1a; border:1px solid #15532e; border-radius:20px; padding:4px 12px; font-size:11px; color:var(--success); }
  .dot { width:6px; height:6px; background:var(--success); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .client-count { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

  .setup-bar { background:#0f172a; border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .setup-label { font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; white-space:nowrap; }
  .setup-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 12px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; outline:none; transition:border-color .2s; }
  .setup-input:focus { border-color:var(--accent); }
  .setup-input::placeholder { color:var(--text-dim); }
  .save-btn { background:var(--accent); border:none; border-radius:8px; padding:6px 16px; color:#fff; font-family:'Hind Siliguri',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .2s; }
  .save-btn:hover { background:#2563eb; }
  .test-btn { background:transparent; border:1px solid var(--border); border-radius:8px; padding:6px 12px; color:var(--text-muted); font-family:'Hind Siliguri',sans-serif; font-size:12px; cursor:pointer; white-space:nowrap; transition:all .2s; }
  .test-btn:hover { border-color:var(--success); color:var(--success); }

  .quick-bar { padding:8px 20px; display:flex; gap:7px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
  .ql { font-size:11px; color:var(--text-dim); align-self:center; white-space:nowrap; }
  .chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 11px; font-size:12px; color:var(--text-muted); cursor:pointer; font-family:'Hind Siliguri',sans-serif; transition:all .2s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); background:#1e3a5f22; }

  .chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
  .chat-area::-webkit-scrollbar { width:4px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

  .msg { display:flex; gap:9px; animation:up .22s ease; max-width:820px; }
  @keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg.user { flex-direction:row-reverse; align-self:flex-end; }
  .msg.bot  { align-self:flex-start; }
  .av { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:2px; }
  .av.bot  { background:linear-gradient(135deg,#1d4ed8,#06b6d4); }
  .av.user { background:var(--surface2); border:1px solid var(--border); }
  .bubble { padding:11px 15px; border-radius:14px; font-size:14px; line-height:1.7; max-width:620px; word-break:break-word; }
  .msg.user .bubble { background:var(--user-bubble); color:#dbeafe; border-bottom-right-radius:3px; }
  .msg.bot  .bubble { background:var(--bot-bubble); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:3px; }
  .ts { font-size:10px; color:var(--text-dim); margin-top:3px; font-family:'JetBrains Mono',monospace; padding:0 3px; align-self:flex-end; }
  .msg.user .ts { text-align:right; }

  .typing-bubble { background:var(--bot-bubble); border:1px solid var(--border); border-radius:14px; border-bottom-left-radius:3px; padding:13px 17px; display:flex; gap:5px; align-items:center; }
  .tdot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.2s infinite; }
  .tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

  .welcome { text-align:center; padding:30px 20px; color:var(--text-muted); }
  .welcome-icon { font-size:50px; margin-bottom:14px; filter:drop-shadow(0 0 18px rgba(59,130,246,.5)); }
  .welcome h2 { font-size:20px; color:var(--text); margin-bottom:8px; font-weight:700; }
  .welcome p  { font-size:13.5px; line-height:1.75; max-width:420px; margin:0 auto; }

  .input-area { padding:14px 20px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:9px; align-items:flex-end; flex-shrink:0; }
  .input-box { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:11px 15px; color:var(--text); font-family:'Hind Siliguri',sans-serif; font-size:14px; outline:none; resize:none; min-height:46px; max-height:120px; line-height:1.5; transition:border-color .2s; }
  .input-box:focus { border-color:var(--accent); }
  .input-box::placeholder { color:var(--text-dim); }
  .send-btn { width:46px; height:46px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
  .send-btn:hover { transform:scale(1.06); filter:brightness(1.1); }
  .send-btn:disabled { opacity:.4; transform:none; cursor:not-allowed; }

  .alert { margin:8px 20px 0; padding:9px 15px; border-radius:9px; font-size:12.5px; display:none; }
  .alert.warn { background:#2d1b00; border:1px solid #78350f; color:var(--warning); }
  .alert.ok   { background:#0d2b1a; border:1px solid #15532e; color:var(--success); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🏗️</div>
    <div>
      <div class="header-title">PlotBot</div>
      <div class="header-sub">Western Valley — ক্লায়েন্ট ডাটাবেজ</div>
    </div>
  </div>
  <div class="header-right">
    <div class="client-count" id="clientCount">— জন ক্লায়েন্ট</div>
    <div class="status-pill"><div class="dot"></div>অনলাইন</div>
  </div>
</div>

<div class="setup-bar" style="display:none">
  <span class="setup-label">Script URL:</span>
  <input type="text" class="setup-input" id="scriptUrl" placeholder="https://script.google.com/macros/s/XXXX/exec">
  <button class="save-btn" onclick="saveConfig()">💾 সেভ</button>
  <button class="test-btn" onclick="testConnection()">🔗 টেস্ট</button>
</div>

<div class="alert warn" id="warnAlert"></div>
<div class="alert ok"   id="okAlert"></div>

<div class="quick-bar">
  <span class="ql">দ্রুত:</span>
  <button class="chip" onclick="q('সব ক্লায়েন্টের তালিকা দাও')">📋 সব ক্লায়েন্ট</button>
  <button class="chip" onclick="q('কোন কোন ক্লায়েন্টের ডাউনপেমেন্ট এখনো দেওয়া হয়নি?')">💰 ডাউনপেমেন্ট বাকি</button>
  <button class="chip" onclick="q('কোন কোন ক্লায়েন্টের ইন্সটলমেন্ট Due আছে?')">📅 Due ইন্সটলমেন্ট</button>
  <button class="chip" onclick="q('Residential South প্লটের সব ক্লায়েন্ট কারা?')">🏘️ Residential South</button>
  <button class="chip" onclick="q('সর্বশেষ বুকিং হওয়া ক্লায়েন্ট কে?')">🆕 নতুন বুকিং</button>
  <button class="chip" onclick="q('মোট কতজন ক্লায়েন্ট আছেন এবং মোট বুকিং মানি কত?')">📊 সারসংক্ষেপ</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeMsg">
    <div class="welcome-icon">🏡</div>
    <h2>স্বাগতম PlotBot-এ</h2>
    <p>Western Valley-এর ক্লায়েন্ট ডাটাবেজ থেকে যেকোনো তথ্য জানতে নিচে প্রশ্ন করুন।</p>
  </div>
</div>

<div class="input-area">
  <textarea class="input-box" id="userInput"
    placeholder="যেমন: Client ID 1636 এর সব তথ্য দাও — অথবা — Asma Akter এর প্লট কোনটি?"
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
</div>

<script>
  let loading = false;
  let apiUrl = 'https://script.google.com/macros/s/AKfycbxHGhySb98G3Gcl-RWlqZPK3L3oX1kdNftRYJnv92sQus_ndU0irS6DnJkQg2s-8pgi/exec';

  window.onload = () => { testConnection();
    if (apiUrl) document.getElementById('scriptUrl').value = apiUrl;
  };

  function saveConfig() {
    const url = document.getElementById('scriptUrl').value.trim();
    if (!url) { showAlert('warn','⚠️ URL দিন'); return; }
    localStorage.setItem('wv_script_url', url);
    apiUrl = url;
    showAlert('ok','✅ URL সেভ হয়েছে! এখন "টেস্ট" বাটনে ক্লিক করুন।');
  }

  async function testConnection() {
    if (!apiUrl) { showAlert('warn','⚠️ আগে URL সেভ করুন'); return; }
    showAlert('ok','🔄 সংযোগ পরীক্ষা করা হচ্ছে...');
    try {
      const res  = await fetch(apiUrl);
      const data = await res.json();
      if (data.total) {
        document.getElementById('clientCount').textContent = data.total + ' জন ক্লায়েন্ট';
        showAlert('ok','✅ সংযোগ সফল! ' + data.total + ' জন ক্লায়েন্ট লোড হয়েছে।');
      } else {
        showAlert('ok','✅ Script চালু আছে।');
      }
    } catch(e) {
      showAlert('warn','❌ সংযোগ ব্যর্থ: ' + e.message);
    }
  }

  function showAlert(type, msg) {
    ['warnAlert','okAlert'].forEach(id => document.getElementById(id).style.display = 'none');
    const el = document.getElementById(type === 'warn' ? 'warnAlert' : 'okAlert');
    el.textContent = msg;
    el.style.display = 'block';
    if (type === 'ok') setTimeout(() => el.style.display = 'none', 4000);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function q(text) {
    document.getElementById('userInput').value = text;
    send();
  }

  function now() {
    return new Date().toLocaleTimeString('bn-BD', {hour:'2-digit', minute:'2-digit'});
  }

  function addMsg(role, text) {
    const chat = document.getElementById('chatArea');
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const av = role === 'bot' ? '🤖' : '👤';
    if (role === 'bot') {
      d.innerHTML = `<div class="av bot">${av}</div><div><div class="bubble">${text}</div><div class="ts">${now()}</div></div>`;
    } else {
      d.innerHTML = `<div><div class="bubble">${text}</div><div class="ts">${now()}</div></div><div class="av user">${av}</div>`;
    }
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chatArea');
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = `<div class="av bot">🤖</div><div class="typing-bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function send() {
    if (loading) return;
    const input = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question) return;
    if (!apiUrl) { showAlert('warn','⚠️ আগে Script URL সেভ করুন'); return; }

    const wl = document.getElementById('welcomeMsg');
    if (wl) wl.remove();

    loading = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = ''; input.style.height = 'auto';

    addMsg('user', question);
    showTyping();

    try {
      // GET request — CORS সমস্যা নেই
      const url = apiUrl + '?q=' + encodeURIComponent(question);
      const res  = await fetch(url);
      const data = await res.json();
      removeTyping();

      if (data.total) {
        document.getElementById('clientCount').textContent = data.total + ' জন ক্লায়েন্ট';
      }

      const answer = (data.answer || 'উত্তর পাওয়া যায়নি।').replace(/\n/g,'<br>');
      addMsg('bot', data.success ? answer : '❌ ' + answer);

    } catch(e) {
      removeTyping();
      addMsg('bot','❌ সংযোগ সমস্যা হয়েছে।<br>Script URL চেক করুন।<br><small>' + e.message + '</small>');
    }

    loading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
